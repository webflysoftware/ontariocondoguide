# Deploy Ontario Condo Guide to hh3 on push to main.
#
# Required GitHub repository secrets:
#   SSH_HOST          — hh3 hostname or IP (e.g. hh3.example.com)
#   SSH_USER          — deploy user on hh3
#   SSH_PRIVATE_KEY   — private key for SSH_USER (PEM, including header/footer)
#
# Optional:
#   SSH_PORT          — SSH port (default 22)
#
# One-time hh3 setup:
#   1. Create deploy user and add the matching public key to ~/.ssh/authorized_keys
#   2. Install nginx + certbot; issue certs for ontariocondoguide.ca
#   3. Install deploy/sudoers-ontariocondoguide (edit DEPLOY_USER first)
#   4. Ensure /var/www/ontariocondoguide is writable by SSH_USER

name: Deploy to hh3

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-hh3-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Configure SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${SSH_HOST}" >> ~/.ssh/known_hosts

      - name: Sync static files to hh3
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          PORT="${SSH_PORT:-22}"
          rsync -avz --delete \
            --chmod=D755,F644 \
            -e "ssh -i ~/.ssh/deploy_key -p ${PORT} -o StrictHostKeyChecking=yes" \
            dist/ \
            "${SSH_USER}@${SSH_HOST}:/var/www/ontariocondoguide/"

      - name: Upload nginx config and run server deploy script
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          PORT="${SSH_PORT:-22}"
          scp -i ~/.ssh/deploy_key -P "${PORT}" \
            deploy/nginx.conf \
            "${SSH_USER}@${SSH_HOST}:/tmp/ontariocondoguide.nginx"
          scp -i ~/.ssh/deploy_key -P "${PORT}" \
            deploy/on-server.sh \
            "${SSH_USER}@${SSH_HOST}:/tmp/ontariocondoguide-deploy.sh"
          ssh -i ~/.ssh/deploy_key -p "${PORT}" \
            "${SSH_USER}@${SSH_HOST}" \
            "chmod +x /tmp/ontariocondoguide-deploy.sh && /tmp/ontariocondoguide-deploy.sh && rm -f /tmp/ontariocondoguide-deploy.sh"
