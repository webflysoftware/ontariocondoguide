# Ontario Condo Guide — production nginx configuration
#
# Usage:
#   1. Build the site: npm run build
#   2. Copy dist/ to /var/www/ontariocondoguide on the server
#   3. Copy this file to /etc/nginx/sites-available/ontariocondoguide
#   4. Enable: ln -s /etc/nginx/sites-available/ontariocondoguide /etc/nginx/sites-enabled/
#   5. Test and reload: nginx -t && systemctl reload nginx
#
# TLS certificates: use certbot or your provider for ontariocondoguide.ca and www.

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name ontariocondoguide.ca www.ontariocondoguide.ca;

    return 301 https://ontariocondoguide.ca$request_uri;
}

# Redirect www to apex
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.ontariocondoguide.ca;

    ssl_certificate     /etc/letsencrypt/live/ontariocondoguide.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ontariocondoguide.ca/privkey.pem;

    return 301 https://ontariocondoguide.ca$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ontariocondoguide.ca;

    root /var/www/ontariocondoguide;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/ontariocondoguide.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ontariocondoguide.ca/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml;

    # Cache static assets (hashed Astro assets live under /_astro/)
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /pagefind/ {
        expires 1h;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location ~* \.(svg|ico|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # JSON and LLM index files — short cache
    location ~* \.(json|txt)$ {
        expires 1h;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Astro static output — try file, then directory index, then 404
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
